tree: "preselection"
output_dir: "plots/abcd_highpsum/"
output_format: "pdf"
lumi_file: /sdf/data/hps/physics2021/preselection/v2/data/lumi_batch1.txt

aliases:
  vertex_mass: "vertex./vertex.invM_"
  vertex_z:    "vertex./vertex.pos_.fZ"

samples:
  - name: data
    directory: /sdf/data/hps/physics2021/preselection/v5/data
    sample_type: data
    label: "Data (2021)"
    color: "black"

  - name: tridents
    directory: /sdf/data/hps/physics2021/preselection/v5/tritrig_smeared
    sample_type: background
    label: "Tridents"
    color: "#e74c3c"
    weight: "weight"
    lumi_scale: true

  - name: wab
    directory: /sdf/data/hps/physics2021/preselection/v5/wab_smeared
    sample_type: background
    label: "WAB"
    color: "#3498db"
    weight: "weight"
    lumi_scale: true

# Hit-layer scenarios become regions.
# Negation is expressed as == 0 (no tilde/exclamation operators).
regions:
  - name: L1L1
    selection: "eleL1 & posL1 & eleL2 & posL2 & (psum > 2.8)"
    label: "L1L1"

  - name: L1L1_SIMP
    # L1L1 base + SIMP-optimised preselection cuts
    # psum 1–3 GeV, vertex projection significance < 4, min |y0| > 0.5 mm
    # Note: adjust min_y0 threshold to match your analysis definition
    selection: "eleL1 & posL1 & eleL2 & posL2 & (psum > 1) & (psum < 3) & (vtx_proj_sig < 4) & (min_y0 > 0.5)"
    label: "L1L1 SIMP"

  - name: L2L2
    selection: "(eleL1 == 0) & (posL1 == 0) & eleL2 & posL2 & (psum > 2.8)"
    label: "L2L2"

  - name: L3L3
    selection: "(eleL1 == 0) & (posL1 == 0) & (eleL2 == 0) & (posL2 == 0) & eleL3 & posL3 & (psum > 2.8)"
    label: "L3L3"

  - name: L1L2
    # One track hits L1, the other hits L2 (but not L1) — symmetric OR
    selection: "(eleL1 & (posL1 == 0) & posL2) | (posL1 & (eleL1 == 0) & eleL2) & (psum > 2.8)"
    label: "L1L2"

  - name: L2L3
    # One track hits L2 (no L1), the other hits L3 (no L1, no L2) — symmetric OR
    selection: "((eleL1 == 0) & eleL2 & (posL1 == 0) & (posL2 == 0) & posL3) | ((posL1 == 0) & posL2 & (eleL1 == 0) & (eleL2 == 0) & eleL3) & (psum > 2.8)"
    label: "L2L3"

plots:
  - name: abcd
    plot_type: abcd
    samples: [data]
    regions: [L1L1, L1L1_SIMP, L1L2, L2L2, L2L3, L3L3]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "vertex_z"
      # Mass scan: 30 – 200 MeV in 1 MeV steps
      mass_scan_min:  0.03
      mass_scan_max:  0.20
      mass_scan_step: 0.003
      # Fixed fallback windows (used for any region not listed in mass_resolution)
      mass_window_half_width: 0.005
      sideband_gap:   0.002
      sideband_width: 0.010
      # Z regions [mm]
      z_signal_min:  10.0
      z_signal_max: 100.0
      z_control_min:  2.0
      z_control_max:  5.0
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true
      # --- mass-dependent window sizing ---
      # SR half-width = sr_sigmas * sigma(m), sideband = sb_sigmas * sigma(m),
      # gap = gap_sigmas * sigma(m).  Expressions are functions of m [GeV].
      # Pol2 fits from smeared MC: sigma(GeV) = p0/1000 + p1*m + p2*1000*m**2
      # (original fit: sigma[MeV] = p0 + p1*m[MeV] + p2*m[MeV]**2)
      sr_sigmas:  1.5
      gap_sigmas: 0.5
      sb_sigmas:  6.5
      mass_resolution:
        # L1 hit: p0=2.5169, p1=-0.0133, p2=1.37e-4  (chi2/ndf=2.3/7)
        L1L1:      "0.0025169 - 0.0133 * m + 0.137 * m**2"
        L1L1_SIMP: "0.0025169 - 0.0133 * m + 0.137 * m**2"
        # L1+L2 cross: p0=1.8020, p1=-0.0005, p2=8.72e-5  (chi2/ndf=7.1/7)
        L1L2:      "0.001802 - 0.0005 * m + 0.0872 * m**2"
        # L2 hit (no L1): p0=2.1272, p1=-0.0065, p2=1.10e-4  (chi2/ndf=4.2/7)
        L2L2:      "0.0021272 - 0.0065 * m + 0.110 * m**2"
        # L2+L3 cross: p0=3.7686, p1=-0.0289, p2=2.03e-4  (chi2/ndf=19.5/7)
        L2L3:      "0.0037686 - 0.0289 * m + 0.203 * m**2"
        # L3 hit (no L1/L2): p0=2.4227, p1=-0.0057, p2=1.50e-4  (chi2/ndf=33.8/7)
        L3L3:      "0.0024227 - 0.0057 * m + 0.150 * m**2"
