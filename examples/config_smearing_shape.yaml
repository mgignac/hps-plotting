tree: "preselection"
output_dir: "plots/"
output_format: "pdf"
lumi_file: /sdf/data/hps/physics2021/preselection/v2/data/lumi_batch1.txt

# Map short names to full ROOT branch paths (for branches with / in path)
aliases:
  ele_px: "ele./ele.px_"
  ele_py: "ele./ele.py_"
  ele_pz: "ele./ele.pz_"
  pos_px: "pos./pos.px_"
  pos_py: "pos./pos.py_"
  pos_pz: "pos./pos.pz_"
  ele_nhits: "ele./ele.track_/ele.track_.n_hits_"
  pos_nhits: "pos./pos.track_/pos.track_.n_hits_"
  ele_chi2: "ele./ele.track_/ele.track_.chi2_"
  pos_chi2: "pos./pos.track_/pos.track_.chi2_"
  ele_d0: "ele./ele.track_/ele.track_.d0_"
  pos_d0: "pos./pos.track_/pos.track_.d0_"
  ele_z0: "ele./ele.track_/ele.track_.z0_"
  pos_z0: "pos./pos.track_/pos.track_.z0_"
  ele_nShared: "ele./ele.track_/ele.track_.nShared_"
  pos_nShared: "pos./pos.track_/pos.track_.nShared_"
  ele_track_time: "ele./ele.track_/ele.track_.track_time_"
  pos_track_time: "pos./pos.track_/pos.track_.track_time_"
  ele_clus_energy: "ele./ele.cluster_/ele.cluster_.energy_"
  pos_clus_energy: "pos./pos.cluster_/pos.cluster_.energy_"
  ele_clus_time: "ele./ele.cluster_/ele.cluster_.time_"
  pos_clus_time: "pos./pos.cluster_/pos.cluster_.time_"
  vtx_invM: "vertex./vertex.invM_"
  vtx_chi2: "vertex./vertex.chi2_"
  vtx_ndf: "vertex./vertex.ndf_"
  vtx_prob: "vertex./vertex.probability_"
  vtx_x: "vertex./vertex.pos_.fX"
  vtx_y: "vertex./vertex.pos_.fY"
  vtx_z: "vertex./vertex.pos_.fZ"

samples:
  - name: unsmeared 
    directory: /sdf/data/hps/physics2021/preselection/v5/tritrig
    sample_type: background
    label: "Tritrig (unsmeared)"
    color: "#db9b34"
    weight: "weight"
    scale: 1.0

  - name: smeared 
    directory: /sdf/data/hps/physics2021/preselection/v5/tritrig_smeared
    sample_type: background
    label: "Tritrig (smeared)"
    color: "#c7c2b9"
    weight: "weight"
    scale: 1.0

regions:
  - name: loose
    selection: "vtx_invM > 0.0"
    label: "Loose"

histograms:
  # Vertex
  - name: vtx_mass
    variable: vtx_invM
    bins: 50
    x_min: 0.0
    x_max: 0.2
    x_label: "$m_{vtx}$ [GeV]"

  - name: vtx_chi2
    variable: vtx_chi2
    bins: 50
    x_min: 0.0
    x_max: 20.0
    x_label: "$\\chi^2_{vtx}$"

  - name: vtx_prob
    variable: vtx_prob
    bins: 50
    x_min: 0.0
    x_max: 1.0
    x_label: "Vertex probability"

  # Momentum sum
  - name: psum
    variable: psum
    bins: 50
    x_min: 0.0
    x_max: 6.0
    x_label: "$p_{e^-} + p_{e^+}$ [GeV]"

  # Electron
  - name: ele_pz
    variable: ele_pz
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$p_{z}^{e^-}$ [GeV]"

  - name: ele_px
    variable: ele_px
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{x}^{e^-}$ [GeV]"

  - name: ele_py
    variable: ele_py
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{y}^{e^-}$ [GeV]"

  - name: ele_nhits
    variable: ele_nhits
    bins: 15
    x_min: 0
    x_max: 15
    x_label: "$N_{hits}^{e^-}$"

  - name: ele_chi2
    variable: ele_chi2
    bins: 50
    x_min: 0.0
    x_max: 50.0
    x_label: "Track $\\chi^2$ ($e^-$)"

  - name: ele_d0
    variable: ele_d0
    bins: 50
    x_min: -5.0
    x_max: 5.0
    x_label: "$d_0^{e^-}$ [mm]"

  - name: ele_z0
    variable: ele_z0
    bins: 50
    x_min: -1.0
    x_max: 1.0
    x_label: "$z_0^{e^-}$ [mm]"
    log_y : true

  # Positron
  - name: pos_pz
    variable: pos_pz
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$p_{z}^{e^+}$ [GeV]"

  - name: pos_px
    variable: pos_px
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{x}^{e^+}$ [GeV]"

  - name: pos_py
    variable: pos_py
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{y}^{e^+}$ [GeV]"

  - name: pos_nhits
    variable: pos_nhits
    bins: 15
    x_min: 0
    x_max: 15
    x_label: "$N_{hits}^{e^+}$"

  - name: pos_chi2
    variable: pos_chi2
    bins: 50
    x_min: 0.0
    x_max: 50.0
    x_label: "Track $\\chi^2$ ($e^+$)"

  - name: pos_d0
    variable: pos_d0
    bins: 50
    x_min: -5.0
    x_max: 5.0
    x_label: "$d_0^{e^+}$ [mm]"

  - name: pos_z0
    variable: pos_z0
    bins: 50
    x_min: -1.0
    x_max: 1.0
    x_label: "$z_0^{e^+}$ [mm]"
    log_y : true

  # Cluster
  - name: ele_clus_energy
    variable: ele_clus_energy
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$E_{clus}^{e^-}$ [GeV]"

  - name: pos_clus_energy
    variable: pos_clus_energy
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$E_{clus}^{e^+}$ [GeV]"

  # Timing
  - name: ele_track_time
    variable: ele_track_time
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "Track time ($e^-$) [ns]"

  - name: pos_track_time
    variable: pos_track_time
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "Track time ($e^+$) [ns]"

  - name: ele_clus_time
    variable: ele_clus_time
    bins: 60
    x_min: -60.0
    x_max: 60.0
    x_label: "Cluster time ($e^-$) [ns]"
    log_y : true

  - name: pos_clus_time
    variable: pos_clus_time
    bins: 50
    x_min: 0.0
    x_max: 100.0
    x_label: "Cluster time ($e^+$) [ns]"

  - name: clus_dt
    variable: "ele_clus_time - pos_clus_time"
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "$t_{clus}^{e^-} - t_{clus}^{e^+}$ [ns]"
    log_y : true

  # Vertex position
  - name: vtx_x
    variable: vtx_x
    bins: 50
    x_min: -2.0
    x_max: 2.0
    x_label: "$x_{vtx}$ [mm]"

  - name: vtx_y
    variable: vtx_y
    bins: 50
    x_min: -0.5
    x_max: 0.5
    x_label: "$y_{vtx}$ [mm]"
    log_y : true

  - name: vtx_z
    variable: vtx_z
    bins: 120
    x_min: -50.0
    x_max: 120.0
    x_label: "$z_{vtx}$ [mm]"
    log_y : true

  # Impact parameter
  - name: min_y0
    variable: min_y0
    bins: 50
    x_min: 0.0
    x_max: 1.0
    x_label: "min $|y_0|$ [mm]"
    log_y : true

plots:
  - name: bkgshape 
    plot_type: overlay 
    output_dir: "plots/smearing_shape/"
    histograms:
      - vtx_mass
      - vtx_chi2
      - vtx_prob
      - psum
      - ele_pz
      - ele_px
      - ele_py
      - ele_nhits
      - ele_chi2
      - ele_d0
      - ele_z0
      - pos_pz
      - pos_px
      - pos_py
      - pos_nhits
      - pos_chi2
      - pos_d0
      - pos_z0
      - ele_clus_energy
      - pos_clus_energy
      - ele_track_time
      - pos_track_time
      - ele_clus_time
      - pos_clus_time
      - min_y0
      - vtx_x
      - vtx_y
      - vtx_z
      - clus_dt
    regions:
      - loose
    samples: [unsmeared,smeared]
    normalize: true
