tree: "preselection"
output_dir: "plots/signal_120/"
output_format: "pdf"
lumi_file: /sdf/data/hps/physics2021/preselection/v2/data/lumi_batch1.txt

# Eq. 4 data-driven signal scaling
# dσ_{A'}/dm = (3π m_{A'} ε²)/(2α) × dσ_{γ*}/dm
# N_data counted in [0.115, 0.125] GeV (± 5 MeV) within the scaling region.
scaling_mass_variable: "vtx_invM"
scaling_mass_window: 0.005   # half-width [GeV]
scaling_rad_frac: 0.05       # f_rad: radiative fraction of background

aliases:
  ele_px: "ele./ele.px_"
  ele_py: "ele./ele.py_"
  ele_pz: "ele./ele.pz_"
  pos_px: "pos./pos.px_"
  pos_py: "pos./pos.py_"
  pos_pz: "pos./pos.pz_"
  ele_nhits: "ele./ele.track_/ele.track_.n_hits_"
  pos_nhits: "pos./pos.track_/pos.track_.n_hits_"
  ele_chi2: "ele./ele.track_/ele.track_.chi2_"
  pos_chi2: "pos./pos.track_/pos.track_.chi2_"
  ele_d0: "ele./ele.track_/ele.track_.d0_"
  pos_d0: "pos./pos.track_/pos.track_.d0_"
  ele_z0: "ele./ele.track_/ele.track_.z0_"
  pos_z0: "pos./pos.track_/pos.track_.z0_"
  ele_nShared: "ele./ele.track_/ele.track_.nShared_"
  pos_nShared: "pos./pos.track_/pos.track_.nShared_"
  ele_track_time: "ele./ele.track_/ele.track_.track_time_"
  pos_track_time: "pos./pos.track_/pos.track_.track_time_"
  ele_clus_energy: "ele./ele.cluster_/ele.cluster_.energy_"
  pos_clus_energy: "pos./pos.cluster_/pos.cluster_.energy_"
  ele_clus_time: "ele./ele.cluster_/ele.cluster_.time_"
  pos_clus_time: "pos./pos.cluster_/pos.cluster_.time_"
  vtx_invM: "vertex./vertex.invM_"
  vtx_chi2: "vertex./vertex.chi2_"
  vtx_ndf: "vertex./vertex.ndf_"
  vtx_prob: "vertex./vertex.probability_"
  vtx_x: "vertex./vertex.pos_.fX"
  vtx_y: "vertex./vertex.pos_.fY"
  vtx_z: "vertex./vertex.pos_.fZ"

samples:
  - name: data
    directory: /sdf/data/hps/physics2021/preselection/v7/data
    sample_type: data
    label: "Data"
    color: "black"
    weight: "1.0"
    scale: 1.0

  - name: tridents
    directory: /sdf/data/hps/physics2021/preselection/v7/tritrig_smeared
    sample_type: background
    label: "Tridents"
    color: "#e74c3c"
    weight: "weight"
    scale: 1.0
    lumi_scale: true

  - name: wab
    directory: /sdf/data/hps/physics2021/preselection/v7/wab_smeared
    sample_type: background
    label: "WAB"
    color: "#3498db"
    weight: "weight"
    scale: 1.0
    lumi_scale: true

  # m_{A'} = 120 MeV, ε²=1e-9 → cτ=0.67 mm
  # weight = MC_weight × 1500 × exp(-z/(βγ cτ)) / (βγ cτ)  [proper-time reweighting]

  - name: signal_120_eps2_1e-9
    directory: /sdf/data/hps/physics2021/preselection/v7/ap_signal_smeared/ap120MeV
    sample_type: signal
    label: "$m_{A'} = 120$ MeV, $\\epsilon^2 = 10^{-9}$"
    color: "#d62728"
    scale : 160000.0
    weight: "weight * 1500.0 * exp(-true_ap.vtx_z_ / (true_ap_betagamma * 0.67)) / (true_ap_betagamma * 0.67)"
    ap_mass: 0.120
    epsilon_sq: 1.0e-9

regions:
  # Loose preselection — used as the Eq. 4 scaling region.
  # Data events in [0.115, 0.125] GeV and signal MC yield here determine the scale.
  - name: loose
    selection: "(vtx_invM > 0.115) & (vtx_invM < 0.125)"
    label: "Loose"
    is_scaling_region: true

  # Signal mass window (120 ± 5 MeV) — one region per hit category
  - name: signal_window_L1L1
    selection: "eleL1 & posL1 & eleL2 & posL2 & (vtx_invM > 0.115) & (vtx_invM < 0.125) & (psum > 2.8)"
    label: "L1L1, $120 \\pm 5$ MeV"

  - name: signal_window_L1L2
    selection: "((eleL1 & (posL1 == 0) & posL2) | (posL1 & (eleL1 == 0) & eleL2)) & (vtx_invM > 0.115) & (vtx_invM < 0.125) & (psum > 2.8)"
    label: "L1L2, $120 \\pm 5$ MeV"

  - name: signal_window_L2L2
    selection: "(eleL1 == 0) & (posL1 == 0) & eleL2 & posL2 & (vtx_invM > 0.115) & (vtx_invM < 0.125) & (psum > 2.8)"
    label: "L2L2, $120 \\pm 5$ MeV"

  - name: signal_window_L2L3
    selection: "(((eleL1 == 0) & eleL2 & (posL1 == 0) & (posL2 == 0) & posL3) | ((posL1 == 0) & posL2 & (eleL1 == 0) & (eleL2 == 0) & eleL3)) & (vtx_invM > 0.115) & (vtx_invM < 0.125) & (psum > 2.8)"
    label: "L2L3, $120 \\pm 5$ MeV"

  - name: signal_window_L3L3
    selection: "(eleL1 == 0) & (posL1 == 0) & (eleL2 == 0) & (posL2 == 0) & eleL3 & posL3 & (vtx_invM > 0.115) & (vtx_invM < 0.125) & (psum > 2.8)"
    label: "L3L3, $120 \\pm 5$ MeV"

histograms:
  # Vertex
  - name: vtx_mass
    variable: vtx_invM
    bins: 50
    x_min: 0.0
    x_max: 0.2
    x_label: "$m_{vtx}$ [GeV]"

  - name: vtx_mass_zoom
    variable: vtx_invM
    bins: 40
    x_min: 0.10
    x_max: 0.14
    x_label: "$m_{vtx}$ [GeV]"

  - name: vtx_chi2
    variable: vtx_chi2
    bins: 50
    x_min: 0.0
    x_max: 20.0
    x_label: "$\\chi^2_{vtx}$"

  - name: vtx_prob
    variable: vtx_prob
    bins: 50
    x_min: 0.0
    x_max: 1.0
    x_label: "Vertex probability"

  # Momentum sum
  - name: psum
    variable: psum
    bins: 50
    x_min: 0.0
    x_max: 6.0
    x_label: "$p_{e^-} + p_{e^+}$ [GeV]"

  # Electron
  - name: ele_pz
    variable: ele_pz
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$p_{z}^{e^-}$ [GeV]"

  - name: ele_px
    variable: ele_px
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{x}^{e^-}$ [GeV]"

  - name: ele_py
    variable: ele_py
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{y}^{e^-}$ [GeV]"

  - name: ele_nhits
    variable: ele_nhits
    bins: 15
    x_min: 0
    x_max: 15
    x_label: "$N_{hits}^{e^-}$"

  - name: ele_chi2
    variable: ele_chi2
    bins: 50
    x_min: 0.0
    x_max: 50.0
    x_label: "Track $\\chi^2$ ($e^-$)"

  - name: ele_d0
    variable: ele_d0
    bins: 50
    x_min: -5.0
    x_max: 5.0
    x_label: "$d_0^{e^-}$ [mm]"

  - name: ele_z0
    variable: ele_z0
    bins: 50
    x_min: -1.0
    x_max: 1.0
    x_label: "$z_0^{e^-}$ [mm]"
    log_y: true

  # Positron
  - name: pos_pz
    variable: pos_pz
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$p_{z}^{e^+}$ [GeV]"

  - name: pos_px
    variable: pos_px
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{x}^{e^+}$ [GeV]"

  - name: pos_py
    variable: pos_py
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{y}^{e^+}$ [GeV]"

  - name: pos_nhits
    variable: pos_nhits
    bins: 15
    x_min: 0
    x_max: 15
    x_label: "$N_{hits}^{e^+}$"

  - name: pos_chi2
    variable: pos_chi2
    bins: 50
    x_min: 0.0
    x_max: 50.0
    x_label: "Track $\\chi^2$ ($e^+$)"

  - name: pos_d0
    variable: pos_d0
    bins: 50
    x_min: -5.0
    x_max: 5.0
    x_label: "$d_0^{e^+}$ [mm]"

  - name: pos_z0
    variable: pos_z0
    bins: 50
    x_min: -1.0
    x_max: 1.0
    x_label: "$z_0^{e^+}$ [mm]"
    log_y: true

  # Cluster
  - name: ele_clus_energy
    variable: ele_clus_energy
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$E_{clus}^{e^-}$ [GeV]"

  - name: pos_clus_energy
    variable: pos_clus_energy
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$E_{clus}^{e^+}$ [GeV]"

  # Timing
  - name: ele_track_time
    variable: ele_track_time
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "Track time ($e^-$) [ns]"

  - name: pos_track_time
    variable: pos_track_time
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "Track time ($e^+$) [ns]"

  - name: ele_clus_time
    variable: ele_clus_time
    bins: 60
    x_min: -60.0
    x_max: 60.0
    x_label: "Cluster time ($e^-$) [ns]"
    log_y: true

  - name: pos_clus_time
    variable: pos_clus_time
    bins: 50
    x_min: 0.0
    x_max: 100.0
    x_label: "Cluster time ($e^+$) [ns]"

  - name: clus_dt
    variable: "ele_clus_time - pos_clus_time"
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "$t_{clus}^{e^-} - t_{clus}^{e^+}$ [ns]"
    log_y: true

  # Vertex position
  - name: vtx_x
    variable: vtx_x
    bins: 50
    x_min: -2.0
    x_max: 2.0
    x_label: "$x_{vtx}$ [mm]"

  - name: vtx_y
    variable: vtx_y
    bins: 50
    x_min: -0.5
    x_max: 0.5
    x_label: "$y_{vtx}$ [mm]"
    log_y: true

  - name: vtx_z
    variable: vtx_z
    bins: 35
    x_min: -20.0
    x_max: 50.0
    x_label: "$z_{vtx}$ [mm]"
    log_y: true

  # Impact parameter
  - name: min_y0
    variable: min_y0
    bins: 50
    x_min: 0.0
    x_max: 1.0
    x_label: "min $|y_0|$ [mm]"
    log_y: true

  - name: vtx_proj_sig
    variable: vtx_proj_sig
    bins: 50
    x_min: 0.0
    x_max: 15.0
    x_label: "Vertex projection significance"
    log_y: true

  - name: tight_ap_ratio
    variable: "(0.02/0.12 * vtx_invM * (vtx_z - (-0.7 + 1.4/0.12 * vtx_invM))) / min_y0"
    bins: 100
    x_min: -5.0
    x_max:  5.0
    x_label: "$\\frac{\\epsilon_{A'}(m, z)}{\\min|y_0|}$"
    log_y: true

plots:
  # Loose preselection: data + MC stack with all six signal curves
  - name: stack_loose
    plot_type: stack
    histograms:
      - vtx_mass
      - vtx_chi2
      - vtx_prob
      - psum
      - ele_pz
      - ele_px
      - ele_py
      - ele_nhits
      - ele_chi2
      - ele_d0
      - ele_z0
      - pos_pz
      - pos_px
      - pos_py
      - pos_nhits
      - pos_chi2
      - pos_d0
      - pos_z0
      - ele_clus_energy
      - pos_clus_energy
      - ele_track_time
      - pos_track_time
      - ele_clus_time
      - pos_clus_time
      - min_y0
      - vtx_proj_sig
      - tight_ap_ratio
      - vtx_x
      - vtx_y
      - vtx_z
      - clus_dt
    regions: [loose]
    samples:
      - signal_120_eps2_1e-9
      - tridents
      - wab
      - data
    data_sample: data

  # Signal mass window (120 ± 5 MeV) — one plot per hit category
  - name: stack_signal_window_L1L1
    plot_type: stack
    histograms: &signal_hists
      - vtx_mass_zoom
      - vtx_chi2
      - vtx_prob
      - psum
      - ele_pz
      - ele_px
      - ele_py
      - ele_nhits
      - ele_chi2
      - ele_d0
      - ele_z0
      - pos_pz
      - pos_px
      - pos_py
      - pos_nhits
      - pos_chi2
      - pos_d0
      - pos_z0
      - ele_clus_energy
      - pos_clus_energy
      - ele_track_time
      - pos_track_time
      - ele_clus_time
      - pos_clus_time
      - min_y0
      - vtx_proj_sig
      - tight_ap_ratio
      - vtx_x
      - vtx_y
      - vtx_z
      - clus_dt
    regions: [signal_window_L1L1]
    samples: &signal_samples
      - signal_120_eps2_1e-9
      - tridents
      - wab
      - data
    data_sample: data

  - name: stack_signal_window_L1L2
    plot_type: stack
    histograms: *signal_hists
    regions: [signal_window_L1L2]
    samples: *signal_samples
    data_sample: data

  - name: stack_signal_window_L2L2
    plot_type: stack
    histograms: *signal_hists
    regions: [signal_window_L2L2]
    samples: *signal_samples
    data_sample: data

  - name: stack_signal_window_L2L3
    plot_type: stack
    histograms: *signal_hists
    regions: [signal_window_L2L3]
    samples: *signal_samples
    data_sample: data

  - name: stack_signal_window_L3L3
    plot_type: stack
    histograms: *signal_hists
    regions: [signal_window_L3L3]
    samples: *signal_samples
    data_sample: data
