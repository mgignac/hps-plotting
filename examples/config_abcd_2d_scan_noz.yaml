tree: "preselection"
output_dir: "plots/abcd_2d_scan_noz/"
output_format: "pdf"
lumi_file: /sdf/data/hps/physics2021/preselection/v2/data/lumi_batch1.txt

scaling_rad_frac: "-1.28948684e-01 + 7.49564672e+00*m - 1.18467019e+02*m**2 + 8.86483892e+02*m**3 - 3.13954474e+03*m**4 + 4.22677239e+03*m**5"

aliases:
  vertex_mass: "vertex./vertex.invM_"
  vertex_z:    "vertex./vertex.pos_.fZ"

# ---------------------------------------------------------------------------
# Shared eps2_scan config applied to every signal sample.
# cτ [mm] = 8.109e-8 / (ε² × m_A' [MeV])  is computed automatically.
# Half-decade spacing from 1e-11 to 1e-6 (11 points, 5 decades).
# ---------------------------------------------------------------------------

samples:
  - name: data
    directory: /sdf/data/hps/physics2021/preselection/v9/data_1pc
    sample_type: data
    label: "Data (2021)"
    color: "black"

  - name: ap_60
    directory: /sdf/data/hps/physics2021/preselection/v9/ap_signal_smeared/ap60MeV
    sample_type: signal
    label: "A' 60 MeV"
    color: "#1f77b4"
    ap_mass: 0.060
    weight: "weight"
    eps2_scan:
      eps2_values: [1.0e-11, 3.16e-11, 1.0e-10, 3.16e-10, 1.0e-9, 3.16e-9, 1.0e-8, 3.16e-8, 1.0e-7, 3.16e-7, 1.0e-6]
      z_branch: "true_ap.vtx_z_"
      betagamma_branch: "true_ap_betagamma"
      gen_length_mm: 1500.0
      target_z_mm: -1.1
      base_weight: "weight"

