# ---------------------------------------------------------------------------
# Regions
# ---------------------------------------------------------------------------
regions:
  - name: inclusive
    selection: "(psum > 2.8)"
    label: "Inclusive"

  - name: L1L1
    selection: "(isL1L1) & (psum > 2.8)"
    label: "L1L1"

  - name: L1L2
    selection: "(isL1L2) & (psum > 2.8)"
    label: "L1L2"

  - name: L2L2
    selection: "(isL2L2) & (psum > 2.8)"
    label: "L2L2"

# ---------------------------------------------------------------------------
# Plots
# ---------------------------------------------------------------------------
plots:
  - name: abcd_2d_scan
    plot_type: abcd
    samples: [data, ap_60, ap_70, ap_80, ap_90, ap_100, ap_110, ap_120, ap_130, ap_140, ap_150, ap_160, ap_170, ap_180]
    regions: [inclusive, L1L1, L1L2, L2L2]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      mass_scan_min:  0.060
      mass_scan_max:  0.180
      mass_scan_step: 0.010
      mass_scan_from_signal_samples: false   # set true to use ap_mass points instead of the grid
      mass_window_half_width: 0.0005
      sideband_gap:           0.002
      sideband_width:         0.010
      signal_norm_hw:         0.0005   # half-width for Eq. 4 N_data/N_mc counting; decouple from ABCD window by changing this
      z_signal_min:  0.0
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true
      json_output: "plots/abcd_2d_scan_noz/results_2d_scan_noz.json"
      signal_2d_output: "enabled"
