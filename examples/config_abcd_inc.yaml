tree: "preselection"
output_dir: "plots/abcd_inc/"
output_format: "pdf"
lumi_file: /sdf/data/hps/physics2021/preselection/v2/data/lumi_batch1.txt

scaling_rad_frac: 0.05097   # f_rad used in Eq. 4 signal normalization

aliases:
  vertex_mass: "vertex./vertex.invM_"
  vertex_z:    "vertex./vertex.pos_.fZ"

# ---------------------------------------------------------------------------
# Samples
# ---------------------------------------------------------------------------
samples:
  - name: data
    directory: /sdf/data/hps/physics2021/preselection/v8/data_1pc_z0_calb_run_by_run
    sample_type: data
    label: "Data (2021)"
    color: "black"
#    run_min: 14000
#    run_max: 14185

  # --- Nominal A' (dark photon → e+e-) ------------------------------------
  # ctau [mm] = 3ℏc / (α ε² m_A'[MeV])  where ℏc = 1.973e-10 MeV·mm
  # Weight: w * L_gen * exp(-(z_true - z_target)/(βγ·cτ)) / (βγ·cτ)
  #   L_gen    = 1500.0 mm  (generation-region length)
  #   z_target = -1.1 mm
  #
  #   m=90 MeV:  ctau = 8.109e-8 / (ε² × 90)
  #   m=120 MeV: ctau = 8.109e-8 / (ε² × 120)
  #   m=180 MeV: ctau = 8.109e-8 / (ε² × 180)

  - name: ap_90
    directory: /sdf/data/hps/physics2021/preselection/v8/ap_signal_smeared/ap90MeV
    sample_type: signal
    label: "A' 90 MeV"
    color: "#dba134"
    ap_mass: 0.090
    weight: "weight"
    weight_scan:
      - label: "ap90_eps2_1e-10"
        epsilon_sq: 1.0e-10
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 9.010)) / (true_ap_betagamma * 9.010)"
        color: "#4a0080"
      - label: "ap90_eps2_1e-9"
        epsilon_sq: 1.0e-9
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 0.9010)) / (true_ap_betagamma * 0.9010)"
        color: "#dba134"
      - label: "ap90_eps2_1e-8"
        epsilon_sq: 1.0e-8
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 0.09010)) / (true_ap_betagamma * 0.09010)"
        color: "#f0c060"

  - name: ap_120
    directory: /sdf/data/hps/physics2021/preselection/v8/ap_signal_smeared/ap120MeV
    sample_type: signal
    label: "A' 120 MeV"
    color: "#dba134"
    ap_mass: 0.120
    weight: "weight"
    weight_scan:
      - label: "ap120_eps2_1e-10"
        epsilon_sq: 1.0e-10
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 6.758)) / (true_ap_betagamma * 6.758)"
        color: "#4a0080"
      - label: "ap120_eps2_1e-9"
        epsilon_sq: 1.0e-9
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 0.6758)) / (true_ap_betagamma * 0.6758)"
        color: "#dba134"
      - label: "ap120_eps2_1e-8"
        epsilon_sq: 1.0e-8
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 0.06758)) / (true_ap_betagamma * 0.06758)"
        color: "#f0c060"

  - name: ap_180
    directory: /sdf/data/hps/physics2021/preselection/v8/ap_signal_smeared/ap180MeV
    sample_type: signal
    label: "A' 180 MeV"
    color: "#dba134"
    ap_mass: 0.180
    weight: "weight"
    weight_scan:
      - label: "ap180_eps2_1e-10"
        epsilon_sq: 1.0e-10
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 4.505)) / (true_ap_betagamma * 4.505)"
        color: "#4a0080"
      - label: "ap180_eps2_1e-9"
        epsilon_sq: 1.0e-9
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 0.4505)) / (true_ap_betagamma * 0.4505)"
        color: "#dba134"
      - label: "ap180_eps2_1e-8"
        epsilon_sq: 1.0e-8
        weight: "weight * 1500.0 * exp(-(true_ap.vtx_z_ + 1.1) / (true_ap_betagamma * 0.04505)) / (true_ap_betagamma * 0.04505)"
        color: "#f0c060"

  # --- SIMP signal ---------------------------------------------------------
  # TODO: verify SIMP branch names (true_vd.vtx_z_, true_vd_betagamma) and
  #       the correct ctau formula for the dark vector meson.  The formula
  #       below mirrors the A' structure as a placeholder; the dark-meson ctau
  #       depends on α_D, f_πD, m_πD, m_VD and is more complex than A'→e+e-.

  - name: simp_90
    directory: /sdf/data/hps/physics2021/preselection/v8/simp_signal_smeared/simp90MeV
    sample_type: signal
    label: "SIMP 90 MeV"
    color: "#3a34db"
    ap_mass: 0.090
    weight: "weight"
    weight_scan:
      - label: "simp90_eps2_1e-10"
        epsilon_sq: 1.0e-10
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#0a0060"
      - label: "simp90_eps2_1e-9"
        epsilon_sq: 1.0e-9
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#3a34db"
      - label: "simp90_eps2_1e-8"
        epsilon_sq: 1.0e-8
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#8080ff"

  - name: simp_120
    directory: /sdf/data/hps/physics2021/preselection/v8/simp_signal_smeared/simp120MeV
    sample_type: signal
    label: "SIMP 120 MeV"
    color: "#3a34db"
    ap_mass: 0.120
    weight: "weight"
    weight_scan:
      - label: "simp120_eps2_1e-10"
        epsilon_sq: 1.0e-10
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#0a0060"
      - label: "simp120_eps2_1e-9"
        epsilon_sq: 1.0e-9
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#3a34db"
      - label: "simp120_eps2_1e-8"
        epsilon_sq: 1.0e-8
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#8080ff"

  - name: simp_180
    directory: /sdf/data/hps/physics2021/preselection/v8/simp_signal_smeared/simp180MeV
    sample_type: signal
    label: "SIMP 180 MeV"
    color: "#3a34db"
    ap_mass: 0.180
    weight: "weight"
    weight_scan:
      - label: "simp180_eps2_1e-10"
        epsilon_sq: 1.0e-10
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#0a0060"
      - label: "simp180_eps2_1e-9"
        epsilon_sq: 1.0e-9
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#3a34db"
      - label: "simp180_eps2_1e-8"
        epsilon_sq: 1.0e-8
        weight: "weight"   # TODO: replace with proper SIMP lifetime weight
        color: "#8080ff"

# ---------------------------------------------------------------------------
# Regions
# ---------------------------------------------------------------------------
regions:
  - name: loose_presel
    selection: "vertex_mass > 0.0"
    label: "Loose preselection"

  - name: inclusive
    selection: "vertex_mass > 0.0"
    label: "Inclusive"

  - name: L1L1
    selection: "isL1L1"
    label: "L1L1"

  - name: L1L2
    selection: "isL1L2"
    label: "L1L2"

  - name: L2L2
    selection: "isL2L2"
    label: "L2L2"

# ---------------------------------------------------------------------------
# Plots
# ---------------------------------------------------------------------------
plots:

  # --- Full mass scan (data only, inclusive) --------------------------------
  - name: abcd_inclusive
    plot_type: abcd
    samples: [data]
    regions: [inclusive]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      mass_scan_min:  0.030
      mass_scan_max:  0.250
      mass_scan_step: 0.003
      # Fixed fallback windows
      mass_window_half_width: 0.005
      sideband_gap:           0.002
      sideband_width:         0.010
      # min_y0 [mm]: signal = displaced, control = prompt
      z_signal_min:  0.2
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true
      # Mass-dependent window sizing (σ(m) expressions in GeV)
      sr_sigmas:  1.5
      gap_sigmas: 0.5
      sb_sigmas:  3.5
      mass_resolution:
        L1L1: "0.0025169 - 0.0133 * m + 0.137 * m**2"
        L1L2: "0.001802  - 0.0005 * m + 0.0872 * m**2"
        L2L2: "0.0021272 - 0.0065 * m + 0.110  * m**2"
        L2L3: "0.0037686 - 0.0289 * m + 0.203  * m**2"
        L3L3: "0.0024227 - 0.0057 * m + 0.150  * m**2"
      json_output: "plots/abcd_inc/results_inclusive.json"
      lumi_projections:
        - label: "10× dataset"
          scale_factor: 10.0
        - label: "100× projection"
          scale_factor: 100.0

  # --- Differential ABCD at 120 MeV ----------------------------------------
  - name: abcd_120
    plot_type: abcd
    samples: [data, ap_120, simp_120]
    regions: [inclusive]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      # Single mass hypothesis: 120 MeV
      mass_scan_min:  0.120
      mass_scan_max:  0.120
      mass_scan_step: 0.003
      # Windows from L2L2 resolution at 120 MeV:
      #   σ = 0.0021272 - 0.0065×0.120 + 0.110×0.120² = 2.931 MeV
      #   hw = 1.5σ = 4.397 MeV,  gap = 0.5σ = 1.466 MeV,  sw = 3.5σ = 10.26 MeV
      mass_window_half_width: 0.004397
      sideband_gap:           0.001466
      sideband_width:         0.010259
      z_signal_min:  0.2
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true
      json_output: "plots/abcd_inc/results_120.json"
      # Signal normalization region for Eq. 4: set to loose_presel to normalize
      # in the full preselection rather than within the ABCD hit-category region.
      # Comment out to use the ABCD region itself (default / tighter behaviour).
#     signal_norm_region: "loose_presel"
      aux_histograms:
        - variable: "psum"
          bins: [0.8, 1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.4, 2.6, 2.8, 3.0, 3.2, 3.4, 3.6, 3.8, 4.0, 4.2, 4.4]
          label: "$p_{\\mathrm{sum}}$ [GeV]"
        - variable: "vtx_proj_sig"
          bins: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 6.0, 7.0, 8.0, 9.0, 10.0]
          label: "Vertex projection significance"

  # --- Differential ABCD at 90 MeV -----------------------------------------
  - name: abcd_90
    plot_type: abcd
    samples: [data, ap_90, simp_90]
    regions: [inclusive]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      mass_scan_min:  0.090
      mass_scan_max:  0.090
      mass_scan_step: 0.003
      # Windows from L2L2 resolution at 90 MeV:
      #   σ = 0.0021272 - 0.0065×0.090 + 0.110×0.090² = 2.433 MeV
      #   hw = 1.5σ = 3.650 MeV,  gap = 0.5σ = 1.217 MeV,  sw = 3.5σ = 8.516 MeV
      mass_window_half_width: 0.003650
      sideband_gap:           0.001217
      sideband_width:         0.008516
      z_signal_min:  0.2
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true
      json_output: "plots/abcd_inc/results_90.json"
#     signal_norm_region: "loose_presel"
      aux_histograms:
        - variable: "psum"
          bins: [0.8, 1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.4, 2.6, 2.8, 3.0, 3.2, 3.4, 3.6, 3.8, 4.0, 4.2, 4.4]
          label: "$p_{\\mathrm{sum}}$ [GeV]"
        - variable: "vtx_proj_sig"
          bins: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 6.0, 7.0, 8.0, 9.0, 10.0]
          label: "Vertex projection significance"

  # --- Differential ABCD at 180 MeV ----------------------------------------
  - name: abcd_180
    plot_type: abcd
    samples: [data, ap_180, simp_180]
    regions: [L1L1, L1L2, L2L2]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      mass_scan_min:  0.180
      mass_scan_max:  0.180
      mass_scan_step: 0.003
      # Windows from L2L2 resolution at 180 MeV:
      #   σ = 0.0021272 - 0.0065×0.180 + 0.110×0.180² = 4.521 MeV
      #   hw = 1.5σ = 6.782 MeV,  gap = 0.5σ = 2.261 MeV,  sw = 3.5σ = 15.82 MeV
      mass_window_half_width: 0.006782
      sideband_gap:           0.002261
      sideband_width:         0.015824
      z_signal_min:  0.2
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true
      json_output: "plots/abcd_inc/results_180.json"
#     signal_norm_region: "loose_presel"
      aux_histograms:
        - variable: "psum"
          bins: [0.8, 1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.4, 2.6, 2.8, 3.0, 3.2, 3.4, 3.6, 3.8, 4.0, 4.2, 4.4]
          label: "$p_{\\mathrm{sum}}$ [GeV]"
        - variable: "vtx_proj_sig"
          bins: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 6.0, 7.0, 8.0, 9.0, 10.0]
          label: "Vertex projection significance"
