tree: "preselection"
output_dir: "plots/abcd_inc/"
output_format: "pdf"
lumi_file: /sdf/data/hps/physics2021/preselection/v2/data/lumi_batch1.txt

aliases:
  vertex_mass: "vertex./vertex.invM_"
  vertex_z:    "vertex./vertex.pos_.fZ"

samples:
  - name: data
    directory: /sdf/data/hps/physics2021/preselection/v8/data_1pc_z0_calb_run_by_run
    sample_type: data
    label: "Data (2021)"
    color: "black"
#    run_min: 14000
#    run_max: 14185

  - name: signal_120_eps5
    directory: /sdf/data/hps/physics2021/preselection/v8/ap_signal_smeared/ap120MeV
    sample_type: signal
    label: "Nominal A' $m_{A'} 120$ MeV"
    color: "#dba134"
    weight: "weight"
    scale: 1.0

  - name: signal_120_simp
    directory: /sdf/data/hps/physics2021/preselection/v8/simp_signal_smeared/simp120MeV
    sample_type: signal
    label: "SIMP $m_{A'} = 120$ MeV"
    color: "#3a34db"
    weight: "weight"
    scale: 1.0

  - name: signal_90_eps5
    directory: /sdf/data/hps/physics2021/preselection/v8/ap_signal_smeared/ap90MeV
    sample_type: signal
    label: "Nominal A' $m_{A'} = 90$ MeV"
    color: "#dba134"
    weight: "weight"
    scale: 1.0

  - name: signal_90_simp
    directory: /sdf/data/hps/physics2021/preselection/v8/simp_signal_smeared/simp90MeV
    sample_type: signal
    label: "SIMP $m_{A'} = 90$ MeV"
    color: "#3a34db"
    weight: "weight"
    scale: 1.0

  - name: signal_180_eps5
    directory: /sdf/data/hps/physics2021/preselection/v8/ap_signal_smeared/ap180MeV
    sample_type: signal
    label: "Nominal A' $m_{A'} = 180$ MeV"
    color: "#dba134"
    weight: "weight"
    scale: 1.0

  - name: signal_180_simp
    directory: /sdf/data/hps/physics2021/preselection/v8/simp_signal_smeared/simp180MeV
    sample_type: signal
    label: "SIMP $m_{A'} = 180$ MeV"
    color: "#3a34db"
    weight: "weight"
    scale: 1.0

regions:
  - name: inclusive
    selection: "vertex.invM_>0.0"
    label: "Inclusive"
  - name: L1L1
    selection: "isL1L1"
    label: "L1L1"
  - name: L1L2
    selection: "isL1L2"
    label: "L1L2"
  - name: L2L2
    selection: "isL2L2"
    label: "L2L2"


plots:
  - name: abcd_inclusive
    plot_type: abcd
    samples: [data]
    regions: [inclusive] #L1L1, L1L2, L2L2]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      # Mass scan: 30 – 200 MeV in 1 MeV steps
      mass_scan_min:  0.030
      mass_scan_max:  0.250
      mass_scan_step: 0.003
      # Fixed fallback windows (used for any region not listed in mass_resolution)
      mass_window_half_width: 0.005
      sideband_gap:   0.002
      sideband_width: 0.010
      # Z regions [mm]
      z_signal_min:  0.2
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      json_output: "plots/abcd_highpsum/results.json"
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true
      # --- mass-dependent window sizing ---
      # SR half-width = sr_sigmas * sigma(m), sideband = sb_sigmas * sigma(m),
      # gap = gap_sigmas * sigma(m).  Expressions are functions of m [GeV].
      # Pol2 fits from smeared MC: sigma(GeV) = p0/1000 + p1*m + p2*1000*m**2
      # (original fit: sigma[MeV] = p0 + p1*m[MeV] + p2*m[MeV]**2)
      sr_sigmas:  1.5
      gap_sigmas: 0.5
      sb_sigmas:  3.5
      mass_resolution:
        # L1 hit: p0=2.5169, p1=-0.0133, p2=1.37e-4  (chi2/ndf=2.3/7)
        L1L1:      "0.0025169 - 0.0133 * m + 0.137 * m**2"
        # L1+L2 cross: p0=1.8020, p1=-0.0005, p2=8.72e-5  (chi2/ndf=7.1/7)
        L1L2:      "0.001802 - 0.0005 * m + 0.0872 * m**2"
        # L2 hit (no L1): p0=2.1272, p1=-0.0065, p2=1.10e-4  (chi2/ndf=4.2/7)
        L2L2:      "0.0021272 - 0.0065 * m + 0.110 * m**2"
        # L2+L3 cross: p0=3.7686, p1=-0.0289, p2=2.03e-4  (chi2/ndf=19.5/7)
        L2L3:      "0.0037686 - 0.0289 * m + 0.203 * m**2"
        # L3 hit (no L1/L2): p0=2.4227, p1=-0.0057, p2=1.50e-4  (chi2/ndf=33.8/7)
        L3L3:      "0.0024227 - 0.0057 * m + 0.150 * m**2"
      # --- luminosity projections ---
      lumi_projections:
        - label: "10% dataset"
          color: "royalblue"
          linestyle: "--"
          scale_factor: 10.0

        - label: "100% projection"
          color: "firebrick"
          linestyle: "-."
          scale_factor: 100.0

  - name: abcd_differential_120
    plot_type: abcd
    samples: [data, signal_120_simp, signal_120_eps5]
    regions: [Linclusive] #1L1, L1L2, L2L2]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      # Fixed mass hypothesis at 120 MeV (single evaluation point)
      mass_scan_min:  0.120
      mass_scan_max:  0.120
      mass_scan_step: 0.003
      # Windows pre-evaluated from L2L2 resolution at 120 MeV:
      #   sigma(120 MeV) = 0.0021272 - 0.0065*0.120 + 0.110*0.120^2 = 2.931 MeV
      #   hw  = 1.5 * sigma = 4.397 MeV
      #   gap = 0.5 * sigma = 1.466 MeV
      #   sw  = 3.5 * sigma = 10.259 MeV
      mass_window_half_width: 0.004397
      sideband_gap:           0.001466
      sideband_width:         0.010259
      # min_y0 regions [mm]: signal = displaced, control = prompt
      z_signal_min:  0.2
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true

      # Each entry produces one histogram.  The base region selection is
      # automatically sliced into disjoint bins of the named variable.
      aux_histograms:
        - variable: "psum"
          bins: [0.8, 1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.4, 2.6, 2.8, 3.0, 3.2, 3.4, 3.6, 3.8, 4.0, 4.2, 4.4]
          label: "$p_{\\mathrm{sum}}$ [GeV]"

        - variable: "vtx_proj_sig"
          bins: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 6.0, 7.0, 8.0, 9.0, 10.0]
          label: "Vertex projection significance"

  - name: abcd_differential_90
    plot_type: abcd
    samples: [data, signal_90_simp, signal_90_eps5]
    regions: [inclusive] #L1L1, L1L2, L2L2]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      # Fixed mass hypothesis at 90 MeV (single evaluation point)
      mass_scan_min:  0.090
      mass_scan_max:  0.090
      mass_scan_step: 0.003
      # Windows pre-evaluated from L2L2 resolution at 90 MeV:
      #   sigma(90 MeV) = 0.0021272 - 0.0065*0.090 + 0.110*0.090^2 = 2.433 MeV
      #   hw  = 1.5 * sigma = 3.650 MeV
      #   gap = 0.5 * sigma = 1.217 MeV
      #   sw  = 3.5 * sigma = 8.516 MeV
      mass_window_half_width: 0.003650
      sideband_gap:           0.001217
      sideband_width:         0.008516
      # min_y0 regions [mm]: signal = displaced, control = prompt
      z_signal_min:  0.2
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true

      aux_histograms:
        - variable: "psum"
          bins: [0.8, 1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.4, 2.6, 2.8, 3.0, 3.2, 3.4, 3.6, 3.8, 4.0, 4.2, 4.4]
          label: "$p_{\\mathrm{sum}}$ [GeV]"

        - variable: "vtx_proj_sig"
          bins: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 6.0, 7.0, 8.0, 9.0, 10.0]
          label: "Vertex projection significance"

  - name: abcd_differential_180
    plot_type: abcd
    samples: [data, signal_180_simp, signal_180_eps5]
    regions: [L1L1, L1L2, L2L2]
    abcd:
      mass_variable: "vertex_mass"
      z_variable:    "min_y0"
      # Fixed mass hypothesis at 180 MeV (single evaluation point)
      mass_scan_min:  0.180
      mass_scan_max:  0.180
      mass_scan_step: 0.003
      # Windows pre-evaluated from L2L2 resolution at 180 MeV:
      #   sigma(180 MeV) = 0.0021272 - 0.0065*0.180 + 0.110*0.180^2 = 4.521 MeV
      #   hw  = 1.5 * sigma = 6.782 MeV
      #   gap = 0.5 * sigma = 2.261 MeV
      #   sw  = 3.5 * sigma = 15.824 MeV
      mass_window_half_width: 0.006782
      sideband_gap:           0.002261
      sideband_width:         0.015824
      # min_y0 regions [mm]: signal = displaced, control = prompt
      z_signal_min:  0.2
      z_signal_max:  1.0e+9
      z_control_min: 0.0
      z_control_max: 0.2
      x_label: "$m_{e^+e^-}$ [GeV]"
      log_y: true

      aux_histograms:
        - variable: "psum"
          bins: [0.8, 1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.4, 2.6, 2.8, 3.0, 3.2, 3.4, 3.6, 3.8, 4.0, 4.2, 4.4]
          label: "$p_{\\mathrm{sum}}$ [GeV]"

        - variable: "vtx_proj_sig"
          bins: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 6.0, 7.0, 8.0, 9.0, 10.0]
          label: "Vertex projection significance"
