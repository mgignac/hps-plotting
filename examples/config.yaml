tree: "preselection"
output_dir: "plots/badrun_14272/"
output_format: "pdf"
lumi_file: /sdf/data/hps/physics2021/preselection/v2/data/lumi_batch1.txt

# Map short names to full ROOT branch paths (for branches with / in path)
aliases:
  ele_px: "ele./ele.px_"
  ele_py: "ele./ele.py_"
  ele_pz: "ele./ele.pz_"
  pos_px: "pos./pos.px_"
  pos_py: "pos./pos.py_"
  pos_pz: "pos./pos.pz_"
  ele_nhits: "ele./ele.track_/ele.track_.n_hits_"
  pos_nhits: "pos./pos.track_/pos.track_.n_hits_"
  ele_chi2: "ele./ele.track_/ele.track_.chi2_"
  pos_chi2: "pos./pos.track_/pos.track_.chi2_"
  ele_d0: "ele./ele.track_/ele.track_.d0_"
  pos_d0: "pos./pos.track_/pos.track_.d0_"
  ele_z0: "ele./ele.track_/ele.track_.z0_"
  pos_z0: "pos./pos.track_/pos.track_.z0_"
  ele_nShared: "ele./ele.track_/ele.track_.nShared_"
  pos_nShared: "pos./pos.track_/pos.track_.nShared_"
  ele_track_time: "ele./ele.track_/ele.track_.track_time_"
  pos_track_time: "pos./pos.track_/pos.track_.track_time_"
  ele_clus_energy: "ele./ele.cluster_/ele.cluster_.energy_"
  pos_clus_energy: "pos./pos.cluster_/pos.cluster_.energy_"
  ele_clus_time: "ele./ele.cluster_/ele.cluster_.time_"
  pos_clus_time: "pos./pos.cluster_/pos.cluster_.time_"
  vtx_invM: "vertex./vertex.invM_"
  vtx_chi2: "vertex./vertex.chi2_"
  vtx_ndf: "vertex./vertex.ndf_"
  vtx_prob: "vertex./vertex.probability_"
  vtx_x: "vertex./vertex.pos_.fX"
  vtx_y: "vertex./vertex.pos_.fY"
  vtx_z: "vertex./vertex.pos_.fZ"

samples:
  - name: data
    directory: /sdf/data/hps/physics2021/preselection/v8/data_5pc
    sample_type: data
    label: "Data"
    color: "black"
    weight: "1.0"
    scale: 1.0
    run_min: 14272 #14282
    run_max: 14272 #14282

  - name: tridents
    directory: /sdf/data/hps/physics2021/preselection/v8/tritrig_z0calib_smeared/
    sample_type: background
    label: "Tridents"
    color: "#e74c3c"
    weight: "weight"
    selection : "(ele_has_truth_link==1 && pos_has_truth_link==1)"
    scale: 1.02 
    lumi_scale: true 

  - name: wab
    directory: /sdf/data/hps/physics2021/preselection/v8/wab_z0calib_smeared/
    sample_type: background
    label: "WAB"
    color: "#3498db"
    weight: "weight"
    selection : "(ele_has_truth_link==1 && pos_has_truth_link==1)"
    scale: 0.6
    lumi_scale: true

  - name: oot
    directory: 
      - /sdf/data/hps/physics2021/preselection/v8/wab_z0calib_smeared/
      - /sdf/data/hps/physics2021/preselection/v8/tritrig_z0calib_smeared/
    sample_type: background
    label: "Out-of-time"
    color: "#b3807b"
    weight: "weight"
    selection : "(ele_has_truth_link==0 || pos_has_truth_link==0)"
    scale: 2.2
    lumi_scale: true

  - name: signal_120_eps4
    directory: /sdf/data/hps/physics2021/preselection/v7/ap_signal_smeared/ap120MeV
    sample_type: signal
    label: "$m_{A'} = 120$ MeV, $\\epsilon = 10^{-4}$"
    color: "#db3442"
    weight: "weight * 1500.0 * exp(-true_ap.vtx_z_ / (true_ap_betagamma * 0.067)) / (true_ap_betagamma * 0.067)"
    scale: 1.0

  - name: signal_120_eps5
    directory: /sdf/data/hps/physics2021/preselection/v7/ap_signal_smeared/ap120MeV
    sample_type: signal
    label: "$m_{A'} = 120$ MeV, $\\epsilon = 10^{-5}$"
    color: "#dba134"
    weight: "weight * 1500.0 * exp(-true_ap.vtx_z_ / (true_ap_betagamma * 6.67)) / (true_ap_betagamma * 6.67)"
    scale: 1.0

regions:

  - name: loose
    selection: ""
    label: "Loose"
  - name: loose_L1L1
    selection: "isL1L1"
    label: "L1L1"
  - name: loose_L2L2
    selection: "isL2L2"
    label: "L2L2"
  - name: loose_L1L2
    selection: "isL1L2"
    label: "L1L2"

histograms:
  # Vertex
  - name: vtx_mass
    variable: vtx_invM
    bins: 50
    x_min: 0.0
    x_max: 0.2
    x_label: "$m_{vtx}$ [GeV]"

  - name: vtx_chi2
    variable: vtx_chi2
    bins: 50
    x_min: 0.0
    x_max: 20.0
    x_label: "$\\chi^2_{vtx}$"

  - name: vtx_prob
    variable: vtx_prob
    bins: 50
    x_min: 0.0
    x_max: 1.0
    x_label: "Vertex probability"

  # Momentum sum
  - name: psum
    variable: psum
    bins: 24
    x_min: 3.0
    x_max: 4.2
    #bins: 50
    #x_min: 0.0
    #x_max: 6.0
    x_label: "$p_{e^-} + p_{e^+}$ [GeV]"

  # Electron
  - name: ele_pz
    variable: ele_pz
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$p_{z}^{e^-}$ [GeV]"

  - name: ele_px
    variable: ele_px
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{x}^{e^-}$ [GeV]"

  - name: ele_py
    variable: ele_py
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{y}^{e^-}$ [GeV]"

  - name: ele_p
    variable: "sqrt(ele_px**2 + ele_py**2 + ele_pz**2)"
    bins: 50
    x_min: 0.0
    x_max: 3.0
    x_label: "$p^{e^-}$ [GeV]"

  - name: ele_nhits
    variable: ele_nhits
    bins: 5
    x_min: 10
    x_max: 15
    x_label: "$N_{hits}^{e^-}$"

  - name: ele_chi2
    variable: ele_chi2
    bins: 50
    x_min: 0.0
    x_max: 50.0
    x_label: "Track $\\chi^2$ ($e^-$)"

  - name: ele_d0
    variable: ele_d0
    bins: 50
    x_min: -5.0
    x_max: 5.0
    x_label: "$d_0^{e^-}$ [mm]"
    log_y : true


  - name: ele_z0
    variable: ele_z0
    bins: 50
    x_min: -1.0
    x_max: 1.0
    x_label: "$z_0^{e^-}$ [mm]"
    log_y : true

  # Positron
  - name: pos_pz
    variable: pos_pz
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$p_{z}^{e^+}$ [GeV]"

  - name: pos_px
    variable: pos_px
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{x}^{e^+}$ [GeV]"

  - name: pos_py
    variable: pos_py
    bins: 50
    x_min: -0.1
    x_max: 0.1
    x_label: "$p_{y}^{e^+}$ [GeV]"

  - name: pos_p
    variable: "sqrt(pos_px**2 + pos_py**2 + pos_pz**2)"
    bins: 50
    x_min: 0.0
    x_max: 3.0
    x_label: "$p^{e^+}$ [GeV]"

  - name: pos_nhits
    variable: pos_nhits
    bins: 5
    x_min: 10
    x_max: 15
    x_label: "$N_{hits}^{e^+}$"

  - name: pos_chi2
    variable: pos_chi2
    bins: 50
    x_min: 0.0
    x_max: 50.0
    x_label: "Track $\\chi^2$ ($e^+$)"

  - name: pos_d0
    variable: pos_d0
    bins: 50
    x_min: -5.0
    x_max: 5.0
    x_label: "$d_0^{e^+}$ [mm]"

  - name: pos_z0
    variable: pos_z0
    bins: 50
    x_min: -1.0
    x_max: 1.0
    x_label: "$z_0^{e^+}$ [mm]"
    log_y : true

  # Cluster
  - name: ele_clus_energy
    variable: ele_clus_energy
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$E_{clus}^{e^-}$ [GeV]"

  - name: pos_clus_energy
    variable: pos_clus_energy
    bins: 50
    x_min: 0.0
    x_max: 5.0
    x_label: "$E_{clus}^{e^+}$ [GeV]"

  # Timing
  - name: ele_track_time
    variable: ele_track_time
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "Track time ($e^-$) [ns]"

  - name: pos_track_time
    variable: pos_track_time
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "Track time ($e^+$) [ns]"

  - name: ele_clus_time
    variable: ele_clus_time
    bins: 60
    x_min: -60.0
    x_max: 60.0
    x_label: "Cluster time ($e^-$) [ns]"
    log_y : true

  - name: pos_clus_time
    variable: pos_clus_time
    bins: 50
    x_min: 0.0
    x_max: 100.0
    x_label: "Cluster time ($e^+$) [ns]"

  - name: clus_dt
    variable: "ele_clus_time - pos_clus_time"
    bins: 50
    x_min: -20.0
    x_max: 20.0
    x_label: "$t_{clus}^{e^-} - t_{clus}^{e^+}$ [ns]"
    log_y : true

  # Vertex position
  - name: vtx_x
    variable: vtx_x
    bins: 50
    x_min: -2.0
    x_max: 2.0
    x_label: "$x_{vtx}$ [mm]"

  - name: vtx_y
    variable: vtx_y
    bins: 50
    x_min: -0.5
    x_max: 0.5
    x_label: "$y_{vtx}$ [mm]"
    log_y : true

  - name: vtx_z
    variable: vtx_z
    bins: 35
    x_min: -20.0
    x_max: 50.0
    x_label: "$z_{vtx}$ [mm]"
    log_y : true

  # Impact parameter
  - name: min_y0
    variable: min_y0
    bins: 50
    x_min: 0.0
    x_max: 1.0
    x_label: "min $|y_0|$ [mm]"
    log_y : true

  - name: vtx_proj_sig
    variable: vtx_proj_sig
    bins: 50
    x_min: 0.0
    x_max: 15.0
    x_label: "Vertex projection significance"
    log_y : true

  - name: tight_ap_ratio
    variable: "(0.02/0.12 * vtx_invM * (vtx_z - (-0.7 + 1.4/0.12 * vtx_invM))) / min_y0"
    bins: 100
    x_min: -5.0
    x_max:  5.0
    x_label: "$\\frac{\\epsilon_{A'}(m, z)}{\\min|y_0|}$"
    log_y: true

plots:
  - name: stack_loose
    plot_type: stack
    histograms:
      - vtx_mass
      - vtx_chi2
      - vtx_prob
      - psum
      - ele_pz
      - ele_px
      - ele_py
      - ele_p
      - ele_nhits
      - ele_chi2
      - ele_d0
      - ele_z0
      - pos_pz
      - pos_px
      - pos_py
      - pos_p
      - pos_nhits
      - pos_chi2
      - pos_d0
      - pos_z0
      - ele_clus_energy
      - pos_clus_energy
      - ele_track_time
      - pos_track_time
      - ele_clus_time
      - pos_clus_time
      - min_y0
      - vtx_proj_sig
      - tight_ap_ratio
      - vtx_x
      - vtx_y
      - vtx_z
      - clus_dt
    regions:
      - loose
      - loose_L1L1
      - loose_L2L2
      - loose_L1L2

    samples: [oot, tridents, wab, data]
    data_sample: data
#    normalize_to_data: true
#    background_fractions:
#      tridents: 0.8
#      wab: 0.2
#    signal_fractions:
#      signal_120_eps4: 0.40
#      signal_120_eps5: 0.40
